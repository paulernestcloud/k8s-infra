apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-management
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/paulernestcloud/k8s-infra.git
    targetRevision: HEAD
    path: infra/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
