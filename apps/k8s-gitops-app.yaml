apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/paulernestcloud/k8s-gitops.git"
    path: k8s/dev
    targetRevision: HEAD
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
